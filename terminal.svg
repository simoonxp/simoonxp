<svg width="500" height="180" viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .term-bg { fill: #0d1117; }
      .term-bar { fill: #21262d; }
      .term-text { font-family: 'Courier New', monospace; font-size: 14px; fill: #58a6ff; }
      .term-text2 { font-family: 'Courier New', monospace; font-size: 14px; fill: #c9d1d9; }
      .term-prompt { font-family: 'Courier New', monospace; font-size: 14px; fill: #3fb950; }
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      .cursor { fill: #58a6ff; }
    </style>
  </defs>

  <rect width="500" height="180" rx="8" class="term-bg"/>
  <rect width="500" height="32" rx="8" class="term-bar"/>
  <circle cx="20" cy="16" r="6" class="dot-red"/>
  <circle cx="42" cy="16" r="6" class="dot-yellow"/>
  <circle cx="64" cy="16" r="6" class="dot-green"/>
  <text x="250" y="21" text-anchor="middle" class="term-text2" font-size="12">felipe@portfolio: ~</text>

  <text x="16" y="60" class="term-prompt">$ <tspan class="term-text2">whoami</tspan></text>
  <text x="16" y="84" class="term-text2">Felipe Simon</text>

  <text x="16" y="112" class="term-prompt">$ <tspan class="term-text2">cat status.txt</tspan></text>
  <text x="16" y="136" class="term-text2">Estudante de Ciência de Dados | FATEC</text>
  <text x="16" y="156" class="term-text2">Aprendendo Python &amp; SQL | Em busca de estágio</text>

  <rect x="16" y="164" width="10" height="14" class="cursor">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
