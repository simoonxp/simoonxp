<svg width="500" height="280" viewBox="0 0 500 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .term-bg { fill: #0d1117; }
      .term-bar { fill: #21262d; }
      .term-text2 { font-family: 'Courier New', monospace; font-size: 13px; fill: #c9d1d9; }
      .term-prompt { font-family: 'Courier New', monospace; font-size: 13px; fill: #3fb950; }
      .term-comment { font-family: 'Courier New', monospace; font-size: 13px; fill: #8b949e; }
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      .cursor { fill: #58a6ff; }
    </style>
  </defs>

  <rect width="500" height="280" rx="8" class="term-bg"/>
  <rect width="500" height="32" rx="8" class="term-bar"/>
  <circle cx="20" cy="16" r="6" class="dot-red"/>
  <circle cx="42" cy="16" r="6" class="dot-yellow"/>
  <circle cx="64" cy="16" r="6" class="dot-green"/>
  <text x="250" y="21" text-anchor="middle" class="term-text2" font-size="12">felipe@portfolio: ~</text>

  <text x="16" y="58" class="term-prompt">$ <tspan class="term-text2">whoami</tspan></text>
  <text x="16" y="80" class="term-text2">Felipe Simon</text>

  <text x="16" y="106" class="term-prompt">$ <tspan class="term-text2">cat sobre-mim.txt</tspan></text>
  <text x="16" y="128" class="term-comment"># Estudante de Ciência de Dados na FATEC - 1º semestre</text>
  <text x="16" y="148" class="term-comment"># Moro em São Bernardo do Campo, SP</text>
  <text x="16" y="172" class="term-text2">- Foco em análise de dados e visualização</text>
  <text x="16" y="194" class="term-text2">- Aprendendo Python, SQL e Power BI</text>
  <text x="16" y="216" class="term-text2">- Explorando novos projetos no tempo livre</text>

  <text x="16" y="244" class="term-prompt">$ <tspan class="term-text2">status --estagio</tspan></text>
  <text x="16" y="266" class="term-text2">Disponível para oportunidades de estágio! 🚀</text>

  <rect x="16" y="274" width="10" height="3" class="cursor">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
